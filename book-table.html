<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Book a Table | OrderEase</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        body {
            background: linear-gradient(120deg, #2563eb 0%, #10b981 100%);
            color: #1e293b;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            margin: 0;
            min-height: 100vh;
        }
        .container {
            max-width: 480px;
            margin: 60px auto;
            background: #fff;
            border-radius: 18px;
            box-shadow: 0 8px 32px rgba(37,99,235,0.12);
            padding: 40px 30px;
        }
        h1 {
            color: #2563eb;
            font-size: 2.2rem;
            margin-bottom: 10px;
            text-align: center;
        }
        .restaurant-name {
            color: #10b981;
            font-size: 1.2rem;
            text-align: center;
            margin-bottom: 30px;
            font-weight: 600;
        }
        .form-group {
            margin-bottom: 22px;
        }
        label {
            display: block;
            margin-bottom: 7px;
            font-weight: 500;
            color: #2563eb;
        }
        input, select {
            width: 100%;
            padding: 13px;
            border: 1px solid #e0e7ef;
            border-radius: 8px;
            font-size: 1rem;
            background: #f8fafc;
            transition: border 0.2s;
        }
        input:focus, select:focus {
            border-color: #10b981;
            outline: none;
        }
        .btn {
            width: 100%;
            padding: 13px;
            border-radius: 50px;
            background: #10b981;
            color: #fff;
            font-size: 1.1rem;
            font-weight: 600;
            border: none;
            cursor: pointer;
            box-shadow: 0 4px 16px rgba(16,185,129,0.15);
            transition: background 0.2s;
        }
        .btn:hover {
            background: #059669;
        }
        .success-message {
            background: #e0fbe0;
            color: #059669;
            border-radius: 8px;
            padding: 16px;
            text-align: center;
            margin-bottom: 18px;
            display: none;
        }
        .back-link {
            display: block;
            margin-top: 30px;
            text-align: center;
            color: #2563eb;
            text-decoration: none;
            font-weight: 500;
            transition: color 0.2s;
        }
        .back-link:hover {
            color: #10b981;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1><i class="fas fa-chair"></i> Book a Table</h1>
        <div class="restaurant-name" id="restaurantName"></div>
        <div class="success-message" id="successMsg">
            <i class="fas fa-check-circle"></i> Your table has been booked successfully!
        </div>
        <form id="bookingForm">
            <div class="form-group">
                <label for="name">Full Name</label>
                <input type="text" id="name" required placeholder="Enter your name">
            </div>
            <div class="form-group">
                <label for="phone">Phone Number</label>
                <input type="tel" id="phone" required placeholder="Enter your phone number">
            </div>
            <div class="form-group">
                <label for="date">Date</label>
                <input type="date" id="date" required>
            </div>
            <div class="form-group">
                <label for="time">Time</label>
                <select id="time" required>
                    <option value="">Select time</option>
                    <option>12:00 PM</option>
                    <option>1:00 PM</option>
                    <option>2:00 PM</option>
                    <option>3:00 PM</option>
                    <option>6:00 PM</option>
                    <option>7:00 PM</option>
                    <option>8:00 PM</option>
                </select>
            </div>
            <div class="form-group">
                <label for="guests">Number of Guests</label>
                <select id="guests" required>
                    <option value="">Select guests</option>
                    <option>1</option>
                    <option>2</option>
                    <option>3</option>
                    <option>4</option>
                    <option>5+</option>
                </select>
            </div>
            <button type="submit" class="btn">Book Now</button>
        </form>
        <a href="index.html" class="back-link"><i class="fas fa-arrow-left"></i> Back to Home</a>
    </div>
    <script>
        // Show restaurant name from URL
        const params = new URLSearchParams(window.location.search);
        const restaurant = params.get('restaurant') || 'Selected Restaurant';
        document.getElementById('restaurantName').textContent = restaurant;

        // Simple form handler
        document.getElementById('bookingForm').addEventListener('submit', function(e) {
            e.preventDefault();
            document.getElementById('successMsg').style.display = 'block';
            setTimeout(() => {
                document.getElementById('successMsg').style.display = 'none';
                document.getElementById('bookingForm').reset();
            }, 3000);
        });
    </script>
</body>
</html>
